name: CI

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y bats shellcheck shfmt

      - name: Validate unit checks
        run: make check

  integration:
    runs-on: ubuntu-latest
    env:
      HEROKU_STACK: ${{ vars.HEROKU_STACK }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install pack
        run: |
          curl -sSL "https://github.com/buildpacks/pack/releases/download/v0.39.1/pack-v0.39.1-linux.tgz" -o /tmp/pack.tgz
          sudo tar -C /usr/local/bin -xzf /tmp/pack.tgz pack
          pack --version

      - name: Run generic integration build
        env:
          TEST_BUILDER: paketobuildpacks/builder-jammy-base
        run: test/integration.bash generic

      - name: Run Heroku integration build
        env:
          HEROKU_STACK: ${{ env.HEROKU_STACK }}
        run: test/integration.bash heroku
