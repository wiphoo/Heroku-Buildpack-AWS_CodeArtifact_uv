name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y bats shellcheck shfmt

      - name: Validate unit checks
        run: make check
